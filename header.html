<header class="header">
  <div class="container">
    <div class="header-content">
      <!-- Logo -->
      <button class="logo-btn">
        <img src="images/logo.png" 
             alt="ABC Fitness Logo" class="logo-img">
        <span class="logo-text">ABC Fitness Studio</span>
      </button>

      <!-- Desktop Navigation -->
      <nav class="desktop-nav">
        <button class="nav-btn" data-page="home">Home</button>
        <button class="nav-btn" data-page="gallery">Gallery</button>
        <button class="nav-btn" data-page="about">About Us</button>
        <button class="nav-btn" data-page="custom">Community</button>
      </nav>

      <!-- Mobile Menu Button -->
      <button class="mobile-menu-btn">
        <i data-lucide="menu" class="menu-icon"></i>
        <i data-lucide="x" class="close-icon hidden"></i>
      </button>
    </div>

    <!-- Mobile Navigation -->
    <nav id="mobileNav" class="mobile-nav hidden">
      <button class="mobile-nav-btn" data-page="home">Home</button>
      <button class="mobile-nav-btn" data-page="gallery">Gallery</button>
      <button class="mobile-nav-btn" data-page="about">About Us</button>
      <button class="mobile-nav-btn" data-page="custom">Community</button>
    </nav>
  </div>
</header>
